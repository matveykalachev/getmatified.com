  :root{
    --void:#080503;
    --amber:#c97a2b;
    --rust:#8a3b1f;
    --yellow:#f2c230;
    --cream:#e8d9a6;
    --ink:#f5ecd8;
    --ink-dim:#b3a17c;
    --panel:#140e08;
    --panel-edge:#4a3418;
    --mono: ui-monospace, "SF Mono", "Cascadia Mono", Consolas, "Roboto Mono", monospace;
    --display: "Cheltenham Display", "Arial Black", "Helvetica Neue", Helvetica, Impact, sans-serif;
    --body: "Cheltenham Text", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  }

  *{ box-sizing:border-box; }

  html,body{
    margin:0;
    padding:0;
    background:var(--void);
    color:var(--ink);
    font-family:var(--body);
    overflow-x:hidden;
    min-height:100%;
  }

  /* ---------- fixed backdrop: black with a warm glow, yellow floor ---------- */
  .sky{
    position:fixed; inset:0; z-index:0;
    background:
      radial-gradient(65% 45% at 50% 22%, rgba(201,122,43,.22) 0%, transparent 70%),
      linear-gradient(180deg, var(--void) 0%, #0b0705 60%, #0a0603 100%);
  }
  .floor{
    position:fixed; left:0; right:0; bottom:0; height:26vh; z-index:1;
    background:linear-gradient(to top, var(--yellow) 0%, rgba(242,194,48,.35) 35%, transparent 100%);
    opacity:.55;
  }
  .grain{
    position:fixed; inset:-20%; z-index:5; pointer-events:none;
    background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='2' stitchTiles='stitch'/></filter><rect width='100%25' height='100%25' filter='url(%23n)'/></svg>");
    opacity:.05;
    mix-blend-mode:overlay;
  }
  .scan{
    position:fixed; inset:0; z-index:6; pointer-events:none;
    background:repeating-linear-gradient(to bottom, rgba(0,0,0,.28) 0px, rgba(0,0,0,.28) 1px, transparent 1px, transparent 3px);
    mix-blend-mode:multiply;
    opacity:.5;
  }
  .vignette{
    position:fixed; inset:0; z-index:7; pointer-events:none;
    background:radial-gradient(120% 90% at 50% 40%, transparent 55%, rgba(0,0,0,.55) 100%);
  }
  .tracking{
    position:fixed; left:0; right:0; height:14px; z-index:8; pointer-events:none;
    background:linear-gradient(to bottom, transparent, rgba(255,255,255,.09), transparent);
    animation:track-sweep 9s linear infinite;
  }
  @keyframes track-sweep{
    0%{ top:-14px; opacity:0; }
    4%{ opacity:.8; }
    12%{ opacity:0; }
    100%{ top:110%; opacity:0; }
  }

  /* ---------- page boot flicker ---------- */
  body::before{
    content:"";
    position:fixed; inset:0; z-index:20; background:#fff;
    animation:boot .7s steps(2,end) forwards;
    pointer-events:none;
  }
  @keyframes boot{
    0%{ opacity:1; }
    30%{ opacity:.1; }
    45%{ opacity:.8; }
    60%{ opacity:0; }
    100%{ opacity:0; visibility:hidden; }
  }

  main{
    position:relative; z-index:2;
    max-width:460px; margin:0 auto;
    padding:22px 18px 46px;
    display:flex; flex-direction:column; gap:22px;
  }

  /* ---------- TV frame ---------- */
  .tube-wrap{ position:relative; }
  .tube{
    position:relative;
    background:linear-gradient(160deg, var(--panel) 0%, #0a0603 100%);
    border:3px solid var(--panel-edge);
    border-radius:22px;
    padding:34px 22px 28px;
    box-shadow:
      0 0 0 1px rgba(201,122,43,.2),
      0 0 40px rgba(242,194,48,.16),
      inset 0 0 60px rgba(0,0,0,.6);
    text-align:center;
    overflow:hidden;
  }
  .tube::after{
    content:"";
    position:absolute; inset:0;
    background:repeating-linear-gradient(to bottom, rgba(0,0,0,.35) 0px, rgba(0,0,0,.35) 1px, transparent 1px, transparent 3px);
    mix-blend-mode:multiply;
    pointer-events:none;
  }
  .chan-tag{
    position:absolute; top:12px; left:16px;
    font-family:var(--mono); font-size:11px; letter-spacing:.1em;
    color:var(--ink-dim);
  }
  .live-tag{
    position:absolute; top:12px; right:16px;
    font-family:var(--mono); font-size:11px; letter-spacing:.1em;
    color:var(--ink-dim);
    display:flex; align-items:center; gap:5px;
  }
  .live-dot{
    width:7px; height:7px; border-radius:50%; background:#ff3b4e;
    box-shadow:0 0 8px #ff3b4e;
    animation:blink 1.2s steps(1,end) infinite;
  }
  @keyframes blink{ 50%{ opacity:.15; } }
  .bug{
    position:absolute; bottom:10px; right:14px; z-index:2;
    height:26px; width:auto;
    opacity:.6;
    filter:drop-shadow(0 0 6px rgba(242,194,48,.25));
  }

  .wordmark{
    font-family:var(--display);
    font-style:normal;
    font-weight:900;
    text-transform:lowercase;
    font-size:clamp(56px,17vw,84px);
    line-height:.9;
    letter-spacing:-.01em;
    margin:14px 0 6px;
    position:relative;
    display:inline-block;
    color:var(--cream);
    text-shadow:
      2px 0 0 var(--amber),
      -2px 0 0 var(--rust),
      0 0 26px rgba(242,194,48,.4);
  }
  /* ---------- link buttons ---------- */
  .links{
    display:flex; flex-direction:column; gap:14px;
  }
  .cta-btn{
    position:relative;
    display:flex; align-items:center; justify-content:center; gap:10px;
    font-family:var(--display); font-style:normal; font-weight:900;
    text-transform:uppercase; letter-spacing:.01em;
    font-size:19px; color:#241606;
    text-decoration:none;
    padding:18px 20px;
    background:linear-gradient(180deg, #ffdd66, var(--yellow));
    border:3px solid var(--void);
    border-radius:10px;
    box-shadow:6px 6px 0 var(--rust), 6px 6px 0 1px var(--void);
    transition:transform .12s ease, box-shadow .12s ease;
  }
  .cta-btn:hover{ transform:translate(-2px,-2px); box-shadow:8px 8px 0 var(--rust), 8px 8px 0 1px var(--void); }
  .cta-btn:active{ transform:translate(4px,4px); box-shadow:1px 1px 0 var(--rust), 1px 1px 0 1px var(--void); }
  .cta-btn svg{ width:22px; height:22px; flex:none; }

  /* ---------- footer ---------- */
  footer{
    text-align:center;
    font-family:var(--mono); font-size:10px; letter-spacing:.05em;
    color:var(--ink-dim); opacity:.75;
    line-height:1.7;
    padding-top:6px;
    border-top:1px dashed var(--panel-edge);
  }
  footer strong{ color:var(--yellow); }

  a:focus-visible, .cta-btn:focus-visible{
    outline:2px solid var(--yellow);
    outline-offset:3px;
  }

  /* ---------- coming soon: album feature ---------- */
  .release{
    border:2px solid var(--panel-edge);
    border-radius:14px;
    background:var(--panel);
    padding:18px;
    text-align:center;
  }
  .release-tag{
    display:inline-flex; align-items:center; gap:6px;
    font-family:var(--mono); font-size:10.5px; letter-spacing:.14em;
    text-transform:uppercase; color:var(--void);
    background:var(--yellow);
    padding:4px 10px; border-radius:20px;
    margin-bottom:14px;
  }
  .release-tag img{ height:9px; width:auto; }
  .release-title{
    font-family:var(--display); font-style:normal; font-weight:900;
    text-transform:uppercase; font-size:26px; letter-spacing:-.01em;
    color:var(--cream);
    margin:0 0 4px;
  }
  .release-sub{
    font-family:var(--mono); font-size:11px; letter-spacing:.08em;
    color:var(--ink-dim); text-transform:uppercase; margin:0 0 16px;
  }
  .covers{
    display:grid; grid-template-columns:1fr 1fr; gap:12px;
  }
  .cover{
    aspect-ratio:1/1;
    border-radius:8px;
    border:2px solid var(--panel-edge);
    background:linear-gradient(160deg, #241606, var(--void));
    color:var(--ink-dim);
    font-family:var(--mono); font-size:10px; letter-spacing:.08em;
    text-transform:uppercase; text-align:center;
    padding:10px;
    overflow:hidden;
  }
  .cover img{
    display:block; width:100%; height:100%; object-fit:cover; border-radius:6px;
  }
  .label-mark{
    display:flex; align-items:center; justify-content:center; gap:6px;
    margin-top:16px;
    font-family:var(--mono); font-size:10px; letter-spacing:.12em;
    color:var(--ink-dim); text-transform:uppercase;
  }
  .label-mark img{ height:20px; width:auto; }

  /* ---------- footer sign-off logo ---------- */
  .sign-off{
    display:flex; justify-content:center; margin-bottom:10px;
  }
  .sign-off img{
    height:30px; width:auto; opacity:.85;
  }

  @media (prefers-reduced-motion: reduce){
    *{ animation-duration:.001ms !important; animation-iteration-count:1 !important; }
  }
</style>
